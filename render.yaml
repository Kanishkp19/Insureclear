services:
  - type: web
    name: insureclear-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_server:server --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PAGEINDEX_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: true
